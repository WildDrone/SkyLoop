name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  golden-tests:
    name: Groundstation golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      # Tests import `from groundstation import ...` and use only stdlib math,
      # so no ROS2 / requirements install needed. cwd must be the package root.
      - name: Run golden tests
        working-directory: src/groundstation
        run: python -m pytest test/ -q
