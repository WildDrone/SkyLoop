services:
  skyloop:
    build:
      context: .
      args:
        UID: 1000
        GID: 1000
    image: skyloop:latest
    container_name: skyloop_ros2
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    pid: host
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - QT_X11_NO_MITSHM=1
      - FASTRTPS_DEFAULT_PROFILES_FILE=/SkyLoop/fastdds.xml
    volumes:
      - ./src:/SkyLoop/src           # Live workspace mount
      - ./recordings:/SkyLoop/recordings  # Video/telemetry recordings
      - /tmp/.X11-unix:/tmp/.X11-unix:rw # X11 socket for GUI
      - /dev/dri:/dev/dri                 # GPU access
      - ./fastdds.xml:/SkyLoop/fastdds.xml:ro  # DDS config
    devices:
      - /dev/dri:/dev/dri
    command: bash